{{- if .Values.application.enabled }}
apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: {{ include "preflight.fullname" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "preflight.labels" . | nindent 4 }}
spec:
  descriptor:
    type: glassbox-preflight
    version: {{ .Chart.AppVersion | quote }}
    description: Free Glassbox Preflight UI for validating inputs, launching canonical jobs, and browsing outputs.
    maintainers:
      - name: Glassbox Bio
    keywords:
      - preflight
      - validation
      - orchestration
      - outputs
  selector:
    matchLabels:
      {{- include "preflight.selectorLabels" . | nindent 6 }}
  addOwnerRef: true
  componentKinds:
    - group: ""
      kind: Secret
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Service
    - group: apps
      kind: Deployment
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: rbac.authorization.k8s.io
      kind: ServiceAccount
{{- end }}
