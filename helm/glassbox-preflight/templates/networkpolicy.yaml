{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "preflight.fullname" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "preflight.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "preflight.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowSameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- if or .Values.networkPolicy.ingressControllerNamespaceLabels .Values.networkPolicy.ingressControllerPodLabels }}
        - {{- if .Values.networkPolicy.ingressControllerNamespaceLabels }}
          namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerNamespaceLabels | nindent 14 }}
          {{- end }}
          {{- if .Values.networkPolicy.ingressControllerPodLabels }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerPodLabels | nindent 14 }}
          {{- end }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- range .Values.networkPolicy.extraEgressCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- range .Values.networkPolicy.extraEgressNamespaceLabels }}
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
    {{- end }}
{{- end }}
