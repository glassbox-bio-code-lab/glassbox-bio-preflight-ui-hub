x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1
  publishedVersion: "1.0.0"
  publishedVersionMetadata:
    releaseNote: Initial release for the standalone Glassbox Preflight UI.
    releaseTypes:
      - Feature
    recommended: true
  images:
    "":
      properties:
        image.repository:
          type: REPO_WITH_REGISTRY
        image.tag:
          type: TAG
    tester:
      properties:
        apptest.image.repository:
          type: REPO_WITH_REGISTRY
        apptest.image.tag:
          type: TAG

properties:
  name:
    type: string
    title: Application name
    x-google-marketplace:
      type: NAME

  namespace:
    type: string
    title: Kubernetes namespace
    x-google-marketplace:
      type: NAMESPACE

  service.type:
    type: string
    title: Service type
    enum:
      - ClusterIP
      - LoadBalancer
      - NodePort
    default: ClusterIP

  service.port:
    type: integer
    title: Service port
    default: 8080
    minimum: 1
    maximum: 65535

  ingress.enabled:
    type: boolean
    title: Enable Ingress
    default: false

  ingress.className:
    type: string
    title: Ingress class name
    default: ""

  app.authDisabled:
    type: boolean
    title: Disable API token auth
    description: Only disable auth for trusted internal ClusterIP installs. Externally exposed service types should keep auth enabled.
    default: false

  app.deploymentEnv:
    type: string
    title: Deployment environment label
    description: Optional environment label exposed to the runtime, for example local, gke-dev, or gke-prod.
    default: ""

  app.clusterProvider:
    type: string
    title: Cluster provider label
    description: Optional cluster provider label exposed to the runtime, for example local-k8s or gke.
    default: ""

  app.runtimeTarget:
    type: string
    title: Runtime target label
    description: Runtime execution target metadata exposed to the Preflight app.
    default: kubernetes

  app.authToken:
    type: string
    title: Operator API token
    description: Optional explicit operator API token. When left blank, the chart preserves an existing auth secret or generates a new admin token on first install.
    default: ""

  auth.existingSecret:
    type: string
    title: Existing auth secret
    description: Existing Secret containing K8S_API_TOKENS JSON for the backend auth layer.
    default: ""

  persistence.size:
    type: string
    title: Shared storage size
    default: 20Gi
    pattern: '^[1-9][0-9]*(\.[0-9]+)?[TGM]i?$'

  persistence.accessMode:
    type: string
    title: Shared storage access mode
    enum:
      - ReadWriteOnce
      - ReadWriteMany
    default: ReadWriteOnce

  persistence.storageClassName:
    type: string
    title: StorageClass
    description: Leave blank to use the cluster default StorageClass.
    default: ""
    x-google-marketplace:
      type: STORAGE_CLASS
      storageClass:
        type: SSD

  storage.type:
    type: string
    title: Shared storage backend
    enum:
      - pvc
      - gcs
    default: pvc

  storage.gcs.bucket:
    type: string
    title: GCS bucket
    description: Required when storage.type=gcs.
    default: ""

  storage.gcs.mountPath:
    type: string
    title: GCS mount path
    default: /data

  app.runnerImage:
    type: string
    title: Default molecular audit runtime image
    default: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit:1.0.0

  app.runnerServiceAccount:
    type: string
    title: Runtime Job service account
    default: ""

  app.runnerAppFullname:
    type: string
    title: Existing molecular audit app fullname
    default: ""

  app.ipftoRunnerImage:
    type: string
    title: IP/FTO runtime image override
    description: Optional explicit IP/FTO worker image. Leave blank to use the chart-managed add-on image.
    default: ""

  app.ipftoServiceAccount:
    type: string
    title: IP/FTO runtime service account override
    default: ""

  app.ipftoConfigMap:
    type: string
    title: IP/FTO add-on ConfigMap override
    default: ""

  app.modulesJson:
    type: string
    title: Module registry override JSON
    default: ""

  app.addonsJson:
    type: string
    title: Add-on registry override JSON
    default: ""

  addons.installations.ipfto.enabled:
    type: boolean
    title: Enable the IP/FTO add-on install resources
    description: Creates the ServiceAccount and ConfigMap that let the existing Preflight runtime expose and launch the IP/FTO module.
    default: false

  addons.installations.ipfto.runnerImage:
    type: string
    title: IP/FTO runner image
    default: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-ip-fto-screening/glassbox-ipfto:1.0.0

  addons.installations.ipfto.configData.GBX_IPFTO_PROJECTS_DIR:
    type: string
    title: IP/FTO projects directory
    default: /data/projects

  addons.installations.ipfto.configData.GBX_INPUT_ROOT:
    type: string
    title: Shared input root for IP/FTO
    default: /data/input

  addons.installations.ipfto.configData.GBX_OUTPUT_ROOT:
    type: string
    title: Shared output root for IP/FTO
    default: /data/output

  addons.ipfto.enabled:
    type: boolean
    title: Enable legacy IP/FTO add-on values
    description: Supported for parity with the hosted Preflight runtime contract. Prefer addons.installations.ipfto for new installs.
    default: false

  addons.ipfto.projectsDir:
    type: string
    title: Optional IP/FTO persistent workspace root
    default: ""

  app.publicAppUrl:
    type: string
    title: Public app URL
    default: ""

  app.publicApiUrl:
    type: string
    title: Public API URL
    description: Base origin for the API, without an appended /api suffix. The frontend appends /api/* paths itself.
    default: ""

  app.allowedOrigins:
    type: string
    title: Allowed browser origins
    description: Comma-separated or JSON-array CORS allowlist for browser origins that may call the API directly. Use * only for controlled dev/test environments.
    default: ""

  billing.enabled:
    type: boolean
    title: Enable marketplace billing sidecar for billable runs
    default: false

  billing.marketplaceReportingSecret:
    type: string
    title: Marketplace reporting secret
    default: ""

  billing.ubbagent.serviceName:
    type: string
    title: Marketplace service name
    description: Required when billing.enabled=true.
    default: ""

  application.enabled:
    type: boolean
    title: Create Kubernetes Application resource
    description: Keep enabled for Google Cloud Marketplace/AppRegistry installs. Disable for generic Helm environments that do not support app.k8s.io Application resources.
    default: true

required:
  - name
  - namespace
