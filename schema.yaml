x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1
  publishedVersion: "1.0.0"
  publishedVersionMetadata:
    releaseNote: Initial release for the standalone Glassbox Preflight UI.
    releaseTypes:
      - Feature
    recommended: true
  images:
    "":
      properties:
        image.repository:
          type: REPO_WITH_REGISTRY
        image.tag:
          type: TAG
    tester:
      properties:
        apptest.image.repository:
          type: REPO_WITH_REGISTRY
        apptest.image.tag:
          type: TAG

properties:
  name:
    type: string
    title: Application name
    x-google-marketplace:
      type: NAME

  namespace:
    type: string
    title: Kubernetes namespace
    x-google-marketplace:
      type: NAMESPACE

  service.type:
    type: string
    title: Service type
    enum:
      - ClusterIP
      - LoadBalancer
      - NodePort
    default: ClusterIP

  service.port:
    type: integer
    title: Service port
    default: 8080
    minimum: 1
    maximum: 65535

  app.authDisabled:
    type: boolean
    title: Disable API token auth
    description: Only disable auth for trusted internal ClusterIP installs. Externally exposed service types should keep auth enabled.
    default: false

  app.authToken:
    type: string
    title: Operator API token
    description: Required when API token auth is enabled. Use this token in the Preflight UI sidebar and for authenticated API calls.
    default: ""

  persistence.size:
    type: string
    title: Shared storage size
    default: 20Gi
    pattern: '^[1-9][0-9]*(\.[0-9]+)?[TGM]i?$'

  persistence.accessMode:
    type: string
    title: Shared storage access mode
    enum:
      - ReadWriteOnce
      - ReadWriteMany
    default: ReadWriteOnce

  persistence.storageClassName:
    type: string
    title: StorageClass
    description: Leave blank to use the cluster default StorageClass.
    default: ""
    x-google-marketplace:
      type: STORAGE_CLASS
      storageClass:
        type: SSD

  app.runnerImage:
    type: string
    title: Default molecular audit runtime image
    default: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit:1.0.0

  app.runnerServiceAccount:
    type: string
    title: Runtime Job service account
    default: ""

  app.runnerAppFullname:
    type: string
    title: Existing molecular audit app fullname
    default: ""

  app.modulesJson:
    type: string
    title: Module registry override JSON
    default: ""

  app.addonsJson:
    type: string
    title: Add-on registry override JSON
    default: ""

  app.ipftoRunnerImage:
    type: string
    title: IP/FTO add-on runner image
    default: ""

  addons.ipfto.projectsDir:
    type: string
    title: IP/FTO workspace root
    description: Absolute path inside the shared volume where IP/FTO project workspaces live. Required for the add-on to resolve <project>/raw/step2a_structured_search artifacts.
    default: ""

  application.enabled:
    type: boolean
    title: Create Kubernetes Application resource
    description: Keep enabled for Google Cloud Marketplace/AppRegistry installs. Disable for generic Helm environments that do not support app.k8s.io Application resources.
    default: true

required:
  - name
  - namespace
