{{- if .Values.application.enabled }}
apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: {{ include "preflight.fullname" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "preflight.labels" . | nindent 4 }}
  annotations:
    marketplace.cloud.google.com/deploy-info: '{"partner_id":"qzC12XfQZs","product_id":"glassbox-bio-preflight-ui-hub","partner_name":"Glassbox Bio"}'
spec:
  descriptor:
    type: glassbox-preflight
    version: {{ .Chart.AppVersion | quote }}
    description: Free Glassbox Preflight UI for validating inputs, launching canonical jobs, and browsing outputs.
    maintainers:
      - name: Glassbox Bio
    keywords:
      - preflight
      - validation
      - orchestration
      - outputs
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
  addOwnerRef: true
  componentKinds:
    - group: ""
      kind: Secret
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Service
    - group: apps
      kind: Deployment
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: rbac.authorization.k8s.io
      kind: ServiceAccount
  notes: |-
    ## Access the Preflight UI

    ```bash
    kubectl -n {{ .Release.Namespace }} port-forward svc/{{ include "preflight.fullname" . }} 8080:{{ .Values.service.port }}
    ```

    Open `http://127.0.0.1:8080`.

    ## What this app does

    This application provides the Glassbox Preflight UI for validation, job launch orchestration, and output browsing.

    ## Runtime linkage

    The preflight UI can launch canonical Molecular Audit jobs when `app.runnerImage` and the related runtime settings are configured.
{{- end }}
