{{- range $addon := .Values.addons.registry }}
{{- $addonId := (($addon.id | default "") | toString | trim) -}}
{{- if $addonId }}
{{- $values := (include "preflight.addonInstallationValues" (list $ $addonId) | fromYaml) | default dict -}}
{{- $enabled := (get $values "enabled") | default false -}}
{{- if $enabled }}
{{- $serviceAccountName := include "preflight.addonServiceAccountName" (list $ $addon) -}}
{{- $configMapName := include "preflight.addonConfigMapName" (list $ $addon) -}}
{{- $runnerImage := include "preflight.addonRunnerImage" (list $ $addon) | trim -}}
{{- $serviceAccountAnnotations := (get $values "serviceAccountAnnotations") | default dict -}}
{{- $configData := (include "preflight.addonConfigData" (list $ $addon) | fromYaml) | default dict -}}
{{- $install := ($addon.install | default dict) -}}
{{- $runnerImageKey := (($install.runnerImageKey | default "runnerImage") | toString | trim) -}}
{{- $readyModes := ($install.readyModes | default list) -}}
{{- $blockedModes := ($install.blockedModes | default list) -}}
{{- $blockedModeNames := list -}}
{{- range $entry := $blockedModes }}
  {{- $mode := (($entry.mode | default "") | toString | trim) -}}
  {{- if $mode }}
    {{- $blockedModeNames = append $blockedModeNames $mode -}}
  {{- end }}
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $serviceAccountName | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "preflight.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ printf "addon-%s" $addonId | quote }}
  {{- with $serviceAccountAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $configMapName | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "preflight.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ printf "addon-%s" $addonId | quote }}
data:
  {{ $runnerImageKey }}: {{ $runnerImage | quote }}
  {{- if eq $addonId "ipfto" }}
  GBX_ENTITLEMENT_URL: {{ default $.Values.app.entitlementUrl (get $configData "GBX_ENTITLEMENT_URL") | quote }}
  GBX_ENTITLEMENT_AUDIENCE: {{ default $.Values.app.entitlementAudience (get $configData "GBX_ENTITLEMENT_AUDIENCE") | quote }}
  GBX_ENTITLEMENT_AUTH_MODE: {{ default $.Values.app.entitlementAuthMode (get $configData "GBX_ENTITLEMENT_AUTH_MODE") | quote }}
  GBX_ENTITLEMENT_TIMEOUT_SEC: {{ default $.Values.app.entitlementTimeoutSec (get $configData "GBX_ENTITLEMENT_TIMEOUT_SEC") | quote }}
  {{- end }}
  {{- if $readyModes }}
  supportedModes: {{ join "," $readyModes | quote }}
  {{- end }}
  {{- if $blockedModeNames }}
  blockedModes: {{ join "," $blockedModeNames | quote }}
  {{- end }}
  {{- range $entry := $blockedModes }}
  {{- $mode := (($entry.mode | default "") | toString | trim) -}}
  {{- if $mode }}
  {{ printf "%sReason" $mode }}: {{ (($entry.message | default "") | toString) | quote }}
  {{- end }}
  {{- end }}
  {{- range $key, $value := $configData }}
  {{- if not (and (eq $addonId "ipfto") (has $key (list "GBX_ENTITLEMENT_URL" "GBX_ENTITLEMENT_AUDIENCE" "GBX_ENTITLEMENT_AUTH_MODE" "GBX_ENTITLEMENT_TIMEOUT_SEC"))) }}
  {{ $key }}: {{ if or (kindIs "slice" $value) (kindIs "map" $value) }}{{ toJson $value | quote }}{{ else }}{{ printf "%v" $value | quote }}{{ end }}
  {{- end }}
  {{- end }}
---
{{- end }}
{{- end }}
{{- end }}
