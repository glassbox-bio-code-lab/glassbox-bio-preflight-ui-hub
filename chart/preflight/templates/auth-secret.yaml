{{- if and (not .Values.app.authDisabled) (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "preflight.authSecretName" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "preflight.labels" . | nindent 4 }}
type: Opaque
stringData:
  K8S_API_TOKENS: |
    {{- include "preflight.authTokensJson" . | nindent 4 }}
{{- end }}
