apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "preflight.fullname" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "preflight.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "preflight.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "preflight.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "preflight.serviceAccountName" . | quote }}
      containers:
        - name: preflight
          image: {{ include "preflight.image" .Values.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ printf "%s-config" (include "preflight.fullname" .) | quote }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "preflight.dataClaimName" . | quote }}
