apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "preflight.fullname" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "preflight.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "preflight.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "preflight.selectorLabels" . | nindent 8 }}
      {{- if eq .Values.storage.type "gcs" }}
      annotations:
        gke-gcsfuse/volumes: "true"
      {{- end }}
    spec:
      serviceAccountName: {{ include "preflight.serviceAccountName" . | quote }}
      containers:
        - name: preflight
          image: {{ include "preflight.image" .Values.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ printf "%s-config" (include "preflight.fullname" .) | quote }}
            {{- if not .Values.app.authDisabled }}
            - secretRef:
                name: {{ include "preflight.authSecretName" . | quote }}
            {{- end }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- if eq .Values.storage.type "gcs" }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.gcs.mountPath | quote }}
          {{- else }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if eq .Values.storage.type "gcs" }}
        - name: data
          csi:
            driver: {{ .Values.storage.gcs.csiDriver | quote }}
            readOnly: {{ ternary true false .Values.storage.gcs.readOnly }}
            volumeAttributes:
              bucketName: {{ .Values.storage.gcs.bucket | quote }}
              implicitDirs: "true"
              implicit-dirs: "true"
              mountOptions: "implicit-dirs"
              gcsfuseOptions: "implicit-dirs"
        {{- else }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "preflight.dataClaimName" . | quote }}
        {{- end }}
