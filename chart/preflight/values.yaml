image:
  repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-preflight-ui-hub/glassbox-preflight
  tag: 1.0.0
  digest: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: preflight.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

networkPolicy:
  enabled: false
  allowSameNamespace: true
  ingressControllerNamespaceLabels: {}
  ingressControllerPodLabels: {}
  extraEgressCidrs: []
  extraEgressNamespaceLabels: []

auth:
  existingSecret: ""
  tokensJson: ""

app:
  deploymentEnv: ""
  clusterProvider: ""
  runtimeTarget: kubernetes
  authDisabled: false
  publicVerification: true
  authToken: ""
  inputRoot: /data/input
  outputRoot: /data/output
  publicAppUrl: ""
  publicApiUrl: ""
  allowedOrigins: ""
  entitlementUrl: ""
  entitlementAuthMode: ""
  entitlementAudience: ""
  entitlementTimeoutSec: ""
  runnerImage: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit:1.0.0
  runnerServiceAccount: ""
  runnerAppFullname: ""
  ipftoRunnerImage: ""
  ipftoServiceAccount: ""
  ipftoConfigMap: ""
  dataPvc: ""
  modulesJson: ""
  addonsJson: ""
  feedback:
    webhookUrl: ""
    webhookBearerToken: ""
    webhookSharedSecret: ""
    webhookTimeoutMs: 8000
  devAdminApi: false

modules:
  registry:
    - id: computational
      title: Computational Audit
      tagline: Canonical Glassbox molecular audit with evidence-linked outputs
      description: Launches the canonical Glassbox runner and writes reproducible artifacts under the shared output root.
      billable: true
      accessTier: metered-core
      pythonModule: app.gbx_core_runner_v3
      outputsPrefix: ""
      startLabel: Run core audit
      parametersSchema:
        type: object
        title: Computational execution
        properties:
          categoryId:
            type: string
            title: Category ID
            description: Required runner category identifier, for example SMALL_MOLECULE__LIGAND_ONLY__NO_STRUCTURE__NO_ASSAYS.
        required:
          - categoryId
      quickLinks:
        - path: results/phase_5_computational_safety.html
          label: Safety Report
          openInNewTab: true
        - path: results/combined_unified_computational_outputs.json
          label: Unified Outputs (JSON)
        - path: results/summary.json
          label: Summary (JSON)
        - path: thresholds/risk_summary.json
          label: Risk Summary (JSON)
        - path: seal/seal.json
          label: Seal Record (JSON)

addons:
  registry:
    - id: ipfto
      title: IP/FTO
      tagline: Deterministic patent diligence with optional LLM reasoning over the retrieved patent corpus
      description: Bootstraps its own IP/FTO workspace from the core run outputs, writes raw artifacts under raw/ipfto/, and writes synthesized report outputs under reports/. full mode adds LLM reasoning over deterministic patent evidence only; agentic browsing and uncontrolled live search remain disabled.
      billable: true
      accessTier: premium-addon
      ubbMetricName: ipfto_integrated_run
      upgradeMessage: Configure the IP/FTO runtime to unlock deterministic post-core patent diligence. The same module handles phase2a-only and LLM-assisted full mode against real core outputs.
      outputsPrefix: raw/ipfto
      quickLinks:
        - path: reports/ipfto_report.html
          label: IP/FTO Report (HTML)
          openInNewTab: true
        - path: reports/ipfto_findings.json
          label: Findings (JSON)
        - path: reports/ipfto_manifest.json
          label: Run Manifest (JSON)
        - path: raw/ipfto/verification/verification_summary.json
          label: Verification Summary (JSON)
      startEndpoint: /api/addons/ipfto/run
      startLabel: Run IP/FTO
      requireRunId: true
      parametersSchema:
        type: object
        title: IP/FTO execution
        properties:
          executionMode:
            type: string
            title: Execution mode
            description: phase2a_only runs deterministic patent evidence search plus claim similarity. full adds LLM reasoning over the same deterministic patent corpus only; it does not enable agentic browsing or uncontrolled live search.
            enum:
              - phase2a_only
              - full
            default: full
          llmProvider:
            type: string
            title: LLM provider
            description: Optional full-mode override. Leave blank to use the deployment-configured default.
            enum:
              - ""
              - openrouter
              - openai
              - anthropic
              - gemini
              - vertex_ai
              - local
            default: ""
          llmModel:
            type: string
            title: LLM model
            description: Optional full-mode override. Leave blank to use the deployment-configured default.
            default: ""
          llmBaseUrl:
            type: string
            title: LLM base URL
            description: Optional full-mode override. Leave blank to use the deployment-configured default.
            default: ""
      prereq:
        requiredFiles:
          - results/combined_unified_computational_outputs.json
      runner:
        command:
          - python
          - -m
          - ipfto_module.addon_runner
        args:
          - --project-id
          - "{projectId}"
          - --run-id
          - "{runId}"
          - --output-root
          - "{outputRoot}"
        env:
          - name: GBX_ADDON_NAME
            value: ipfto
          - name: GBX_ADDON_OUTPUT_SUBDIR
            value: raw/ipfto
          - name: GBX_IPFTO_MODE
            value: "{addonMode}"
          - name: LLM_PROVIDER
            value: "{llmProvider}"
          - name: LLM_MODEL
            value: "{llmModel}"
          - name: LLM_BASE_URL
            value: "{llmBaseUrl}"
      install:
        serviceAccountName: gbx-ipfto-runner
        configMapName: gbx-ipfto-addon
        runnerImageEnv: GBX_IPFTO_RUNNER_IMAGE
        runnerImageKey: runnerImage
        projectsDirKey: projectsDir
        readyModes:
          - phase2a_only
          - full
        requiredConfig:
          - label: Default LLM provider
            key: LLM_PROVIDER
            env: LLM_PROVIDER
            modes:
              - full
            code: llm_runtime_config_missing
            message: Full IP/FTO mode requires a deployment-configured default LLM provider in the add-on config.
          - label: Default LLM model
            key: LLM_MODEL
            env: LLM_MODEL
            modes:
              - full
            code: llm_runtime_config_missing
            message: Full IP/FTO mode requires a deployment-configured default LLM model in the add-on config.
          - label: Default LLM base URL
            key: LLM_BASE_URL
            env: LLM_BASE_URL
            modes:
              - full
            code: llm_runtime_config_missing
            message: Full IP/FTO mode requires a deployment-configured default LLM base URL in the add-on config.
          - label: Google Patents BigQuery sync
            key: GBX_GOOGLE_PATENTS_SYNC_ENABLED
            env: GBX_GOOGLE_PATENTS_SYNC_ENABLED
            modes:
              - phase2a_only
              - full
            code: patent_source_config_missing
            message: IP/FTO requires a configured deterministic patent source; set GBX_GOOGLE_PATENTS_SYNC_ENABLED and GBX_GOOGLE_CLOUD_PROJECT for Google Patents BigQuery.
          - label: Google Cloud project for patent BigQuery
            key: GBX_GOOGLE_CLOUD_PROJECT
            env: GBX_GOOGLE_CLOUD_PROJECT
            modes:
              - phase2a_only
              - full
            code: patent_source_config_missing
            message: IP/FTO requires a Google Cloud project with BigQuery job access for deterministic Google Patents evidence retrieval.
          - label: Entitlement seal service URL
            key: GBX_ENTITLEMENT_URL
            env: GBX_ENTITLEMENT_URL
            modes:
              - phase2a_only
              - full
            code: seal_runtime_config_missing
            message: IP/FTO requires GBX_ENTITLEMENT_URL so run provenance can be sealed through the entitlement service.
        requiredSecrets:
          - label: LLM credentials
            anyOfEnvNames:
              - OPENAI_API_KEY
              - OPENROUTER_API_KEY
              - ANTHROPIC_API_KEY
              - GEMINI_API_KEY
              - GOOGLE_API_KEY
            modes:
              - full
            code: llm_credentials_missing
            message: Full IP/FTO mode requires an add-on secret that provides LLM credentials for reasoning over the deterministic patent corpus.
  # Preferred for new add-ons: supply install-time resource values under
  # addons.installations.<addonId>. The chart ranges over addons.registry and
  # renders generic ServiceAccount/ConfigMap resources for any enabled entry.
  # Legacy per-addon keys remain supported for internal installs.
  installations: {}
  ipfto:
    enabled: false
    serviceAccountName: gbx-ipfto-runner
    configMapName: gbx-ipfto-addon
    serviceAccountAnnotations: {}
    configData: {}
    # Optional non-secret runtime config for the IP/FTO add-on. Example:
    # configData:
    #   GBX_GOOGLE_PATENTS_SYNC_ENABLED: "1"
    #   GBX_GOOGLE_CLOUD_PROJECT: customer-gcp-project
    #   GBX_IPFTO_PRIOR_ART_PROVIDERS: google_patents_bq
    #   LLM_PROVIDER: provider-name
    #   LLM_MODEL: provider/model-name
    #   LLM_BASE_URL: https://provider.example/v1
    # Optional secret refs injected directly into the add-on Job environment.
    # Example:
    # secretRefs:
    #   - secretName: gbx-ipfto-runtime
    #     env:
    #       - name: OPENAI_API_KEY
    #         key: OPENAI_API_KEY
    #       - name: SERPER_API_KEY
    #         key: SERPER_API_KEY
    #         optional: true
    #       - name: GBX_GOOGLE_CLOUD_PROJECT
    #         key: GBX_GOOGLE_CLOUD_PROJECT
    secretRefs: []
    # Optional persistent workspace root. If unset, the add-on bootstraps a
    # run-scoped workspace under 07_addons/ipfto/_workspace/.
    projectsDir: ""
    image:
      repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-ip-fto-screening/glassbox-ipfto
      tag: 1.0.0
      digest: ""
      pullPolicy: IfNotPresent

storage:
  type: pvc
  pvc:
    existingClaim: ""
    size: 20Gi
    accessMode: ReadWriteOnce
    storageClassName: ""
  gcs:
    bucket: ""
    mountPath: /data
    csiDriver: gcsfuse.csi.storage.gke.io
    readOnly: false

# Legacy values retained for compatibility with older install overlays.
persistence:
  size: 20Gi
  accessMode: ReadWriteOnce
  storageClassName: ""

billing:
  enabled: false
  marketplaceReportingSecret: ""
  ubbagent:
    image:
      repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit/ubbagent
      tag: "1.0.0"
      digest: ""
      pullPolicy: IfNotPresent
    localPort: "4567"
    metricName: glassbox_mol_audit_run
    metricNameStandard: standard_audit_run
    metricNameDeep: deep_audit_run
    metricNameIpftoIntegrated: ipfto_integrated_run
    serviceName: services/molecular-audit-core.endpoints.glassbox-bio-public.cloud.goog

application:
  enabled: true

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

apptest:
  enabled: false
  image:
    repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-preflight-ui-hub/glassbox-preflight/tester
    tag: 1.0.0
    digest: ""
    pullPolicy: Always

runtimeTools:
  enabled: true
  image:
    repository: debian
    tag: bookworm-slim
    pullPolicy: IfNotPresent
  installPath: /tools
  kubectlVersion: v1.35.3
  helmVersion: v4.0.1
