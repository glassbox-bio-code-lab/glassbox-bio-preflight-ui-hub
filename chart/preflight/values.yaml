image:
  repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-preflight-ui-hub/glassbox-preflight
  tag: 1.0.0
  digest: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

service:
  type: ClusterIP
  port: 8080

app:
  authDisabled: true
  inputRoot: /data/input
  outputRoot: /data/output
  runnerImage: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit:1.0.0
  runnerServiceAccount: ""
  runnerAppFullname: ""
  dataPvc: ""
  modulesJson: ""
  addonsJson: ""
  ipftoRunnerImage: ""
  ipftoServiceAccount: gbx-ipfto-runner
  ipftoConfigMap: gbx-ipfto-addon
  feedback:
    webhookUrl: ""
    webhookBearerToken: ""
    webhookSharedSecret: ""
    webhookTimeoutMs: 8000
  devAdminApi: false

modules:
  registry:
    - id: computational
      title: Computational Audit
      tagline: Canonical Glassbox molecular audit with evidence-linked outputs
      description: Launches the canonical Glassbox runner and writes reproducible artifacts under the shared output root.
      billable: true
      accessTier: metered-core
      pythonModule: app.gbx_core_runner_v3
      outputsPrefix: ""
      startLabel: Run core audit
      quickLinks:
        - path: results/phase_5_computational_safety.html
          label: Safety Report
          openInNewTab: true
        - path: results/combined_unified_computational_outputs.json
          label: Unified Outputs (JSON)
        - path: results/summary.json
          label: Summary (JSON)
        - path: thresholds/risk_summary.json
          label: Risk Summary (JSON)
        - path: seal/seal.json
          label: Seal Record (JSON)

addons:
  registry:
    - id: ipfto
      title: IP / Freedom-to-Operate
      tagline: Prior-art and claim similarity review against an existing core run
      description: Runs as a separate append-only Kubernetes Job and writes IP/FTO outputs under 07_addons/ipfto/.
      accessTier: premium-addon
      upgradeMessage: Install the IP/FTO add-on image and namespace resources to unlock post-core patent diligence. Kubernetes execution currently supports phase2a_only only.
      outputsPrefix: 07_addons/ipfto
      quickLinks:
        - path: 07_addons/ipfto/ipfto_report.html
          label: IP/FTO Report (HTML)
          openInNewTab: true
        - path: 07_addons/ipfto/ipfto_findings.json
          label: Findings (JSON)
        - path: 07_addons/ipfto/ipfto_manifest.json
          label: Add-on Manifest (JSON)
        - path: 07_addons/ipfto/verification_summary.json
          label: Verification Summary (JSON)
      startEndpoint: /api/addons/ipfto/run
      statusEndpoint: /api/addons/ipfto/status
      startLabel: Run IP/FTO
      requireRunId: true
      parametersSchema:
        type: object
        title: IP/FTO execution
        properties:
          executionMode:
            type: string
            title: Execution mode
            description: phase2a_only consumes existing patent-domain evidence. full additionally expects an existing prior-art workspace.
            enum:
              - phase2a_only
              - full
            default: phase2a_only
      prereq:
        requiredFiles:
          - results/combined_unified_computational_outputs.json
      runner:
        command:
          - python
          - -m
          - ipfto_module.addon_runner
        args:
          - --project-id
          - "{projectId}"
          - --run-id
          - "{runId}"
          - --output-root
          - "{outputRoot}"
        env:
          - name: GBX_ADDON_NAME
            value: ipfto
          - name: GBX_ADDON_OUTPUT_SUBDIR
            value: 07_addons/ipfto
          - name: GBX_IPFTO_MODE
            value: "{addonMode}"
      install:
        serviceAccountName: gbx-ipfto-runner
        configMapName: gbx-ipfto-addon
        runnerImageEnv: GBX_IPFTO_RUNNER_IMAGE
        runnerImageKey: runnerImage
        projectsDirKey: projectsDir
        readyModes:
          - phase2a_only
        blockedModes:
          - mode: full
            code: full_mode_not_wired
            message: Full mode requires GBX_IPFTO_PROJECTS_DIR plus additional credential/config plumbing that is not part of the current preflight chart.
        requiredConfig:
          - key: projectsDir
            env: GBX_IPFTO_PROJECTS_DIR
            label: project workspace root
            modes:
              - phase2a_only
            code: workspace_not_configured
            message: phase2a_only requires addons.ipfto.projectsDir or GBX_IPFTO_PROJECTS_DIR so the add-on can resolve the existing IP/FTO workspace.
    - id: cim
      title: Continuous Intelligence Monitoring
      tagline: Customer-hosted follow-up monitoring against an existing core run
      description: Runs as a separate Kubernetes Job and writes timestamped follow-up artifacts under followups/<timestamp>/.
      accessTier: customer-addon
      upgradeMessage: Install the CIM/Sentinel add-on image and namespace resources to unlock customer-hosted post-audit monitoring. Preflight currently supports airgap execution only.
      outputsPrefix: followups
      quickLinks: []
      startEndpoint: /api/addons/cim/run
      startLabel: Run Follow-Up
      requireRunId: true
      parametersSchema:
        type: object
        title: Sentinel follow-up execution
        properties:
          executionMode:
            type: string
            title: Execution mode
            description: airgap is supported in the current preflight contract. Connector-backed modes remain blocked until explicit connector wiring is added.
            enum:
              - airgap
              - gcp_internal
              - open_web
            default: airgap
          cadence:
            type: string
            title: Cadence
            enum:
              - manual
              - weekly
              - biweekly
              - monthly
            default: manual
          briefFormat:
            type: string
            title: Brief format
            enum:
              - standard
              - board_memo
              - technical
            default: standard
          maxAlerts:
            type: integer
            title: Max alerts
            minimum: 1
            maximum: 100
            default: 25
          enrichmentEnabled:
            type: boolean
            title: Enable enrichment
            default: false
          bqTemplates:
            type: array
            title: BigQuery templates
            items:
              type: string
            default:
              - bq.patents.assignee_counts.v1
              - bq.pmc.keyword_snippets.v1
          cachePolicy:
            type: string
            title: Cache policy
            enum:
              - snapshot_required
              - live_ok
            default: snapshot_required
        required:
          - executionMode
      prereq:
        requiredFiles:
          - results/combined_unified_computational_outputs.json
      runner:
        command:
          - python
          - -m
          - glassbox.sentinel.run
        env:
          - name: GBX_SENTINEL_EXECUTION_MODE
            value: "{addonMode}"
          - name: GBX_SENTINEL_CADENCE
            value: "{cadence}"
          - name: GBX_SENTINEL_BRIEF_FORMAT
            value: "{briefFormat}"
          - name: GBX_SENTINEL_MAX_ALERTS
            value: "{maxAlerts}"
          - name: GBX_SENTINEL_ENRICHMENT
            value: "{enrichmentEnabled}"
          - name: GBX_SENTINEL_BQ_TEMPLATES
            value: "{bqTemplates}"
          - name: GBX_SENTINEL_CACHE_POLICY
            value: "{cachePolicy}"
      install:
        serviceAccountName: gbx-cim-runner
        configMapName: gbx-cim-addon
        runnerImageKey: runnerImage
        readyModes:
          - airgap
        blockedModes:
          - mode: gcp_internal
            code: connector_not_wired
            message: gcp_internal requires connector-service wiring that is not part of the current preflight chart.
          - mode: open_web
            code: connector_not_wired
            message: open_web requires connector-service and egress-policy wiring that is not part of the current preflight chart.
  # Preferred for new add-ons: supply install-time resource values under
  # addons.installations.<addonId>. The chart ranges over addons.registry and
  # renders generic ServiceAccount/ConfigMap resources for any enabled entry.
  # Legacy per-addon keys like addons.ipfto.* and addons.cim.* remain supported.
  installations: {}
  ipfto:
    enabled: true
    serviceAccountName: gbx-ipfto-runner
    configMapName: gbx-ipfto-addon
    serviceAccountAnnotations: {}
    configData: {}
    # Required for runnable Kubernetes execution: must point at the shared
    # project workspace root that contains <project>/raw/step2a_structured_search/.
    projectsDir: ""
    image:
      repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-preflight-ui-hub/glassbox-preflight/ipfto
      tag: 1.0.0
      digest: ""
      pullPolicy: IfNotPresent
  cim:
    enabled: false
    serviceAccountName: gbx-cim-runner
    configMapName: gbx-cim-addon
    serviceAccountAnnotations: {}
    configData: {}
    image:
      repository: glassbox/sentinel
      tag: 1.0.0
      digest: ""
      pullPolicy: IfNotPresent

persistence:
  size: 20Gi
  storageClassName: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

apptest:
  enabled: false
  image:
    repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-preflight-ui-hub/glassbox-preflight/tester
    tag: 1.0.0
    digest: ""
    pullPolicy: Always
